openapi: "3.0.2"
info:
  title: Rhapsody Diagram Exporter API
  description: IBM Rhapsody 모델에서 다이어그램 이미지를 추출하고 저장하는 API
  version: "1.0.0"
servers:
  - url: http://localhost:8000
    description: Local FastAPI Server (필요시 ngrok 등 외부 접속 URL로 변경)
paths:
  /api/v1/export-diagram:
    post:
      summary: 다이어그램 추출 및 저장
      description: >
        IBM Rhapsody 모델에서 특정 이름의 다이어그램을 찾아 PNG 이미지로 저장합니다.
        save_project를 True로 설정하면 저장 후 프로젝트를 자동으로 저장합니다.
      operationId: exportSpecificDiagram
      requestBody:
        description: 다이어그램 추출을 위한 매개변수
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportRequest"
      responses:
        "200":
          description: 다이어그램 추출 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResponse"
        "400":
          description: 잘못된 요청 (필수 파라미터 누락 등)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 지정한 이름의 다이어그램을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 서버 내부 오류 (Rhapsody 연결 실패 등)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/list-diagrams:
    get:
      summary: 전체 다이어그램 목록 조회
      description: >
        현재 열려 있는 Rhapsody 프로젝트에서 사용 가능한 모든 다이어그램의
        이름과 종류(타입)를 반환합니다.
      operationId: listDiagrams
      responses:
        "200":
          description: 다이어그램 목록 반환 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListDiagramsResponse"
        "500":
          description: Rhapsody 연결 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/export-all:
    post:
      summary: 전체 다이어그램 일괄 추출
      description: >
        현재 열려 있는 Rhapsody 프로젝트의 모든 다이어그램을 지정된 폴더에
        일괄적으로 PNG 이미지로 저장합니다.
      operationId: exportAllDiagrams
      requestBody:
        description: 일괄 추출을 위한 저장 경로
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportAllRequest"
      responses:
        "200":
          description: 일괄 추출 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportAllResponse"
        "500":
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ExportRequest:
      type: object
      required:
        - diagram_name
        - save_path
      properties:
        diagram_name:
          type: string
          description: "찾을 다이어그램의 정확한 이름 (예: 'StatechartDiagram')"
          example: "StatechartDiagram"
        save_path:
          type: string
          description: "저장할 절대 경로 (예: 'C:\\exports\\diagram.png')"
          example: "C:\\exports\\StatechartDiagram.png"
        save_project:
          type: boolean
          description: "True이면 이미지 저장 후 Rhapsody 프로젝트를 자동 저장"
          default: false

    ExportResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          description: 작업 성공 여부
        message:
          type: string
          description: 상세 결과 메시지
        saved_path:
          type: string
          description: 실제로 저장된 파일의 절대 경로

    ExportAllRequest:
      type: object
      required:
        - save_directory
      properties:
        save_directory:
          type: string
          description: "모든 다이어그램 이미지를 저장할 폴더 경로 (예: 'C:\\exports\\')"
          example: "C:\\exports\\"
        save_project:
          type: boolean
          description: "True이면 전체 저장 완료 후 Rhapsody 프로젝트를 자동 저장"
          default: false

    ExportAllResponse:
      type: object
      required:
        - success
        - message
        - total_count
      properties:
        success:
          type: boolean
          description: 작업 성공 여부
        message:
          type: string
          description: 상세 결과 메시지
        total_count:
          type: integer
          description: 추출된 다이어그램 총 개수
        saved_files:
          type: array
          description: 저장된 파일 경로 목록
          items:
            type: string

    ListDiagramsResponse:
      type: object
      required:
        - success
        - diagrams
      properties:
        success:
          type: boolean
          description: 조회 성공 여부
        diagrams:
          type: array
          description: 프로젝트 내 다이어그램 목록
          items:
            type: object
            properties:
              name:
                type: string
                description: 다이어그램 이름
              type:
                type: string
                description: "다이어그램 종류 (예: StatechartDiagram, SequenceDiagram, ClassDiagram)"
              owner:
                type: string
                description: 해당 다이어그램이 속한 패키지 또는 컴포넌트 이름

    ErrorResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          description: 항상 false
          example: false
        message:
          type: string
          description: 오류 원인 및 상세 설명
        error_code:
          type: string
          description: "오류 코드 (예: DIAGRAM_NOT_FOUND, RHAPSODY_CONNECTION_FAILED)"
