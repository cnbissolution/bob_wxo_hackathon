openapi: 3.0.3
info:
  title: C&bis Partner Information API
  description: |
    C&bis(씨앤비스) 파트너사의 회사 정보, 서비스 역량, 연락처를 제공하는 API입니다.
    ASPICE 심사·컨설팅, IBM ELM/DOORS Next, PTC codeBeamer, ALM/PLM/MBSE
    엔지니어링 시스템 구축 전문 역량 정보를 조회할 수 있습니다.
  version: 1.0.0
  contact:
    name: C&bis 기술영업팀
    url: https://www.cnbis.co.kr
    email: info@cnbis.co.kr
  license:
    name: Proprietary
servers:
  - url: https://api.cnbis.co.kr/v1
    description: C&bis 파트너 정보 API 서버 (Production)
  - url: https://api-dev.cnbis.co.kr/v1
    description: C&bis 파트너 정보 API 서버 (Development)

tags:
  - name: company
    description: 회사 개요 및 일반 정보
  - name: services
    description: 서비스별 상세 역량 및 레퍼런스
  - name: contact
    description: 상담 및 연락처 정보

paths:
  /company/overview:
    get:
      operationId: get_cnbis_company_overview
      summary: C&bis 회사 개요 조회
      description: |
        C&bis의 회사 개요, 핵심 사업 영역, 주요 고객사, 보유 인증·자격 등
        파트너사 전반 정보를 반환합니다.
        사용자가 C&bis가 어떤 회사인지 처음 물어볼 때 사용합니다.
      tags:
        - company
      parameters:
        - name: lang
          in: query
          required: false
          schema:
            type: string
            enum: [ko, en]
            default: ko
          description: "응답 언어 설정 (ko: 한국어, en: 영어)"
      responses:
        "200":
          description: 회사 개요 정보 반환 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyOverviewResponse'
              example:
                is_success: true
                tool_output:
                  company_name: "C&bis(씨앤비스)"
                  founded_year: 2010
                  headquarters: "대한민국 서울"
                  tagline: "엔지니어링 시스템 & 프로세스 혁신 파트너"
                  business_areas:
                    - "ASPICE 심사 및 컨설팅"
                    - "IBM ELM / DOORS Next 구축"
                    - "PTC codeBeamer ALM 구축"
                    - "ALM / PLM / MBSE 엔지니어링 시스템 구축"
                  key_industries:
                    - "자동차 (Automotive)"
                    - "항공우주 (Aerospace & Defense)"
                    - "의료기기 (Medical Device)"
                    - "철도 (Railway)"
                  certifications:
                    - "VDA QMC 공인 ASPICE 심사 기관"
                    - "IBM Business Partner (ELM)"
                    - "PTC Partner (codeBeamer)"
                  employee_count: "50+"
                error_details: null
        "500":
          $ref: '#/components/responses/InternalServerError'

  /services/{service_name}:
    get:
      operationId: get_cnbis_service_detail
      summary: C&bis 특정 서비스 상세 역량 조회
      description: |
        ASPICE 컨설팅, IBM ELM, PTC codeBeamer, ALM/PLM/MBSE 중 특정 서비스의
        상세 역량, 수행 방법론, 도구 사용 경험, 레퍼런스 프로젝트 요약을 반환합니다.
      tags:
        - services
      parameters:
        - name: service_name
          in: path
          required: true
          schema:
            type: string
            enum:
              - ASPICE
              - IBM_ELM
              - codeBeamer
              - ALM_PLM_MBSE
          description: |
            조회할 서비스 분류
            - ASPICE: Automotive SPICE 심사 및 프로세스 컨설팅
            - IBM_ELM: IBM Engineering Lifecycle Management / DOORS Next 구축
            - codeBeamer: PTC codeBeamer ALM 구축 및 마이그레이션
            - ALM_PLM_MBSE: ALM/PLM/MBSE 통합 엔지니어링 시스템 구축
        - name: industry
          in: query
          required: false
          schema:
            type: string
            enum:
              - automotive
              - aerospace
              - medical_device
              - railway
              - general
            default: general
          description: 사용자의 산업 도메인 필터 (해당 산업 레퍼런스 우선 반환)
        - name: lang
          in: query
          required: false
          schema:
            type: string
            enum: [ko, en]
            default: ko
          description: 응답 언어 설정
      responses:
        "200":
          description: 서비스 상세 역량 정보 반환 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceDetailResponse'
              example:
                is_success: true
                tool_output:
                  service_name: "ASPICE"
                  service_title: "Automotive SPICE 심사 및 컨설팅"
                  summary: "C&bis는 VDA QMC 공인 심사 기관으로 ASPICE Level 1~3 심사 및 프로세스 개선 컨설팅을 제공합니다."
                  capabilities:
                    - capability: "ASPICE Gap Analysis"
                      description: "PAM(Process Assessment Model) 기반 현황 분석 및 개선 과제 도출"
                    - capability: "ASPICE 심사 수행"
                      description: "공인 Lead Assessor 주도 공식 심사 및 심사 보고서 작성"
                    - capability: "프로세스 개선 로드맵"
                      description: "목표 수준(Level 2/3) 달성을 위한 단계별 개선 계획 수립 및 이행 지원"
                    - capability: "교육 및 워크숍"
                      description: "ASPICE 개념, 프로세스 작성 실습, 심사 대비 워크숍 운영"
                  tools_and_methods:
                    - "VDA ASPICE PAM 4.0"
                    - "ISO/IEC 33001 프로세스 평가 방법론"
                    - "IBM ELM 연계 프로세스 증거 관리"
                  reference_summary:
                    - industry: "automotive"
                      description: "국내외 Tier-1 자동차 부품사 ASPICE Level 2/3 달성 지원 다수"
                    - industry: "aerospace"
                      description: "항공 SW 개발 조직 DO-178C 연계 프로세스 개선 컨설팅"
                error_details: null
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /contact:
    get:
      operationId: get_cnbis_contact_info
      summary: C&bis 상담 및 연락처 정보 조회
      description: |
        C&bis 기술영업팀, 컨설팅팀의 연락처, 홈페이지 URL, 상담 신청 방법을 반환합니다.
        사용자가 상담 신청이나 문의를 원할 때 사용합니다.
      tags:
        - contact
      parameters:
        - name: inquiry_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - general
              - ASPICE
              - IBM_ELM
              - codeBeamer
              - ALM_PLM_MBSE
            default: general
          description: 문의 유형 (해당 서비스 담당 부서 연락처 우선 반환)
      responses:
        "200":
          description: 연락처 정보 반환 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactInfoResponse'
              example:
                is_success: true
                tool_output:
                  company_name: "C&bis(씨앤비스)"
                  website: "https://www.cnbis.co.kr"
                  general_email: "info@cnbis.co.kr"
                  phone: "+82-2-XXXX-XXXX"
                  departments:
                    - department: "ASPICE 컨설팅팀"
                      email: "aspice@cnbis.co.kr"
                      description: "ASPICE 심사, 컨설팅, 교육 문의"
                    - department: "엔지니어링 시스템팀"
                      email: "elm@cnbis.co.kr"
                      description: "IBM ELM, codeBeamer, ALM/PLM/MBSE 구축 문의"
                  consultation_channels:
                    - type: "온라인 상담 신청"
                      url: "https://www.cnbis.co.kr/contact"
                    - type: "기술 세미나 신청"
                      url: "https://www.cnbis.co.kr/seminar"
                  business_hours: "평일 09:00 ~ 18:00 KST"
                error_details: null
        "500":
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    ToolResponse:
      type: object
      description: 모든 API 응답의 공통 래퍼 스키마 (watsonx Orchestrate ToolResponse 형식)
      required:
        - is_success
      properties:
        is_success:
          type: boolean
          description: 요청 처리 성공 여부
        tool_output:
          description: 성공 시 반환 데이터 (실패 시 null)
          nullable: true
        error_details:
          $ref: '#/components/schemas/ErrorDetails'

    ErrorDetails:
      type: object
      description: 오류 발생 시 상세 정보
      nullable: true
      properties:
        reason:
          type: string
          description: 오류 원인 설명
        recommendation:
          type: string
          description: 사용자에게 제안하는 해결 방법

    CompanyOverviewResponse:
      allOf:
        - $ref: '#/components/schemas/ToolResponse'
        - type: object
          properties:
            tool_output:
              type: object
              nullable: true
              properties:
                company_name:
                  type: string
                  description: 회사명
                founded_year:
                  type: integer
                  description: 설립 연도
                headquarters:
                  type: string
                  description: 본사 위치
                tagline:
                  type: string
                  description: 회사 슬로건
                business_areas:
                  type: array
                  items:
                    type: string
                  description: 핵심 사업 영역 목록
                key_industries:
                  type: array
                  items:
                    type: string
                  description: 주요 타겟 산업 목록
                certifications:
                  type: array
                  items:
                    type: string
                  description: 보유 인증 및 파트너십 목록
                employee_count:
                  type: string
                  description: 임직원 수 (대략적 범위)

    ServiceDetailResponse:
      allOf:
        - $ref: '#/components/schemas/ToolResponse'
        - type: object
          properties:
            tool_output:
              type: object
              nullable: true
              properties:
                service_name:
                  type: string
                  description: 서비스 분류 코드
                service_title:
                  type: string
                  description: 서비스 전체 명칭
                summary:
                  type: string
                  description: 서비스 한 줄 요약
                capabilities:
                  type: array
                  description: 세부 역량 목록
                  items:
                    type: object
                    properties:
                      capability:
                        type: string
                        description: 역량명
                      description:
                        type: string
                        description: 역량 상세 설명
                tools_and_methods:
                  type: array
                  items:
                    type: string
                  description: 활용 도구 및 방법론 목록
                reference_summary:
                  type: array
                  description: 레퍼런스 요약 (산업별)
                  items:
                    type: object
                    properties:
                      industry:
                        type: string
                        description: 산업 도메인
                      description:
                        type: string
                        description: 수행 내용 요약

    ContactInfoResponse:
      allOf:
        - $ref: '#/components/schemas/ToolResponse'
        - type: object
          properties:
            tool_output:
              type: object
              nullable: true
              properties:
                company_name:
                  type: string
                website:
                  type: string
                  format: uri
                general_email:
                  type: string
                  format: email
                phone:
                  type: string
                departments:
                  type: array
                  items:
                    type: object
                    properties:
                      department:
                        type: string
                        description: 부서명
                      email:
                        type: string
                        format: email
                      description:
                        type: string
                        description: 담당 업무 설명
                consultation_channels:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: 채널 유형
                      url:
                        type: string
                        format: uri
                business_hours:
                  type: string
                  description: 영업 시간

  responses:
    NotFound:
      description: 요청한 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ToolResponse'
          example:
            is_success: false
            tool_output: null
            error_details:
              reason: "요청한 서비스 분류를 찾을 수 없습니다."
              recommendation: "service_name을 ASPICE, IBM_ELM, codeBeamer, ALM_PLM_MBSE 중 하나로 지정하세요."

    InternalServerError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ToolResponse'
          example:
            is_success: false
            tool_output: null
            error_details:
              reason: "서버 내부 오류가 발생했습니다."
              recommendation: "잠시 후 다시 시도하거나 info@cnbis.co.kr로 문의하세요."

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: "C&bis API 접근을 위한 API 키 (발급 문의: info@cnbis.co.kr)"

security:
  - ApiKeyAuth: []
